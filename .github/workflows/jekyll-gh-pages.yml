name: Deploy Angular to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        # Добавляем указание папки
        run: npm install
        working-directory: my-angular-app

      - name: Build Angular
        # Добавляем указание папки и здесь
        run: npx ng build --configuration production --base-href /my-angular-app/
        working-directory: my-angular-app

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Проверяем путь: папка проекта / dist / папка проекта / browser
          path: my-angular-app/dist/my-angular-app/browser

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
